        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        html, body, #root {
            height: 100vh;   /* fallback */
            height: 100dvh;  /* respeita a barra do navegador no mobile */
        }
        body {
            font-family: 'VT323', monospace;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden; /* o scroll é gerenciado dentro de cada tela */
            background-color: #0d0221;
            color: #f5f5f5;
        }
        /* Grade/scanlines estilo monitor CRT de fliperama */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            background:
              repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.18) 0px,
                rgba(0, 0, 0, 0.18) 1px,
                transparent 1px,
                transparent 3px
              );
            mix-blend-mode: multiply;
        }
        /* Fundo com grade de neon sutil */
        #root {
            background-color: #0d0221;
            background-image:
              linear-gradient(rgba(177, 76, 255, 0.07) 1px, transparent 1px),
              linear-gradient(90deg, rgba(177, 76, 255, 0.07) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        /* Fontes pixeladas renderizam melhor sem antialiasing exagerado */
        .font-pixel { -webkit-font-smoothing: none; image-rendering: pixelated; }
        /* Texto da fonte VT323 um pouco maior por padrão (ela é miúda) */
        .text-retro-base { font-size: 1.25rem; line-height: 1.3; }
        /* Brilho neon reutilizável */
        .glow-cyan   { text-shadow: 0 0 8px rgba(0,229,255,0.8), 0 0 2px rgba(0,229,255,1); }
        .glow-pink   { text-shadow: 0 0 8px rgba(255,45,149,0.8), 0 0 2px rgba(255,45,149,1); }
        .glow-yellow { text-shadow: 0 0 8px rgba(255,214,10,0.8), 0 0 2px rgba(255,214,10,1); }
        .glow-green  { text-shadow: 0 0 8px rgba(57,255,20,0.8), 0 0 2px rgba(57,255,20,1); }
        /* Cursor piscando estilo terminal */
        @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
        .blink { animation: blink 1s steps(1) infinite; }
    </style>
